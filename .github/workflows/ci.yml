name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check
      - name: Test default Spotify build
        run: cargo test -p kill-silence --locked
      - name: Test Web API-only core
        run: cargo test -p kill-silence --locked --no-default-features
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy -p kill-silence --all-targets --locked -- -D warnings
